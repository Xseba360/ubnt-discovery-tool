name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up JDK 13
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '13'
          cache: gradle
      - name: Build with Gradle Wrapper
        run: ./gradlew --no-daemon build
